<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">pyoverview terminal UI screenshot</title>
  <desc id="desc">A two-pane terminal interface showing a Python outline on the left and syntax-highlighted source code on the right.</desc>
  <rect width="1200" height="720" rx="18" fill="#0d1117"/>
