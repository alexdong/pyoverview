  <circle cx="102" cy="49" r="7" fill="#27c93f"/>
  <text x="600" y="55" text-anchor="middle" font-family="SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace" font-size="14" fill="#8b949e">pyoverview reviewer.py</text>

  <rect x="54" y="94" width="334" height="536" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <rect x="388" y="94" width="758" height="536" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
